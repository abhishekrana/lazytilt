# GoReleaser config (schema v2). Runs on a pushed `v*` tag via the release
# workflow. Docs: https://goreleaser.com
version: 2

project_name: lazytilt

before:
  hooks:
    - go mod tidy

builds:
  - id: lazytilt
    main: .
    binary: lazytilt
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: lazytilt
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  draft: false
  prerelease: auto
